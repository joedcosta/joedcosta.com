<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Eine Kulinarische Reise — Vorschau</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;overflow-x:hidden;}
body{
  background:#1c1914;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:100vh;padding:24px 12px;
  font-family:Georgia,serif;user-select:none;
}

/* ── BOOK ── */
.book-wrapper{
  position:relative;
  width:680px;height:480px;
  filter:drop-shadow(0 32px 64px rgba(0,0,0,0.85));
}
.book-spine{
  position:absolute;left:50%;top:0;bottom:0;width:8px;
  transform:translateX(-50%);z-index:10;
  background:linear-gradient(to right,#050303,#1a0e05,#050303);
}

/* pages */
.page{
  position:absolute;top:0;
  width:340px;height:480px;
  backface-visibility:hidden;
  transform-style:preserve-3d;
}
.page.left {left:0;   transform-origin:right center;}
.page.right{left:340px;transform-origin:left center;}

/* page face — image fills it */
.page-face{
  width:100%;height:100%;
  background:#f5edd8;
  overflow:hidden;position:relative;
}
.page.left  .page-face{border-radius:4px 0 0 4px;border:1px solid rgba(0,0,0,0.12);}
.page.right .page-face{border-radius:0 4px 4px 0;border:1px solid rgba(0,0,0,0.12);}

/* full-page image */
.page-face img.full{
  width:100%;height:100%;
  object-fit:cover;object-position:top center;
  display:block;
}

/* image-top layout: photo top half, text bottom */
.page-face .img-top{
  width:100%;height:55%;
  object-fit:cover;object-position:center;
  display:block;
}
.page-face .caption-area{
  padding:14px 18px;
  display:flex;flex-direction:column;
  justify-content:center;height:45%;
}
.page-face .cap-title{
  font-family:Georgia,serif;font-size:0.62rem;
  letter-spacing:.14em;color:#1a1008;
  text-transform:uppercase;margin-bottom:6px;
}
.page-face .cap-text{
  font-family:Georgia,serif;font-size:0.62rem;
  font-style:italic;color:#3a2810;line-height:1.6;
}

/* text-only layout */
.page-face .text-page{
  padding:28px 24px;height:100%;
  display:flex;flex-direction:column;
  background:#f5edd8;
}
.page-face .text-page .pgnum{
  font-family:Georgia,serif;font-size:0.46rem;
  letter-spacing:.2em;color:rgba(200,132,58,0.45);
  text-transform:uppercase;text-align:center;
  margin-bottom:12px;
}
.page-face .text-page .ch-label{
  font-family:Georgia,serif;font-size:0.52rem;
  letter-spacing:.24em;color:#c8843a;
  text-transform:uppercase;margin-bottom:6px;
}
.page-face .text-page .ch-title{
  font-family:Georgia,serif;font-size:1.0rem;
  letter-spacing:.08em;color:#1a1008;
  line-height:1.3;margin-bottom:8px;
}
.page-face .text-page .ch-sub{
  font-family:Georgia,serif;font-size:0.65rem;
  letter-spacing:.08em;color:#3a2810;
  margin-bottom:10px;
}
.page-face .text-page .divider{
  width:100%;height:1px;
  background:rgba(200,132,58,0.2);
  margin:8px 0;
}
.page-face .text-page .epigraph{
  font-family:Georgia,serif;font-size:0.65rem;
  font-style:italic;color:#3a2810;
  line-height:1.65;margin:8px 0;
  padding-left:10px;
  border-left:2px solid rgba(200,132,58,0.3);
}
.page-face .text-page .body{
  font-family:Georgia,serif;font-size:0.62rem;
  color:#2a1c0c;line-height:1.78;
  margin-bottom:7px;text-align:justify;
}
.page-face .text-page .body.dc::first-letter{
  font-family:Georgia,serif;font-size:2.6rem;
  font-weight:600;float:left;line-height:.78;
  margin-right:5px;margin-top:4px;color:#c8843a;
}
.page-face .text-page .body b{font-weight:600;}

/* dark cover/back */
.page-face.dark{background:#0f0d0a;}

/* edge shadows */
.page.left  .page-face::after{
  content:'';position:absolute;right:0;top:0;bottom:0;width:20px;
  background:linear-gradient(to left,rgba(0,0,0,0.14),transparent);
  pointer-events:none;z-index:5;
}
.page.right .page-face::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:20px;
  background:linear-gradient(to right,rgba(0,0,0,0.1),transparent);
  pointer-events:none;z-index:5;
}

/* flip animations */
@keyframes fwdOutR{0%{transform:rotateY(0)}100%{transform:rotateY(180deg)}}
@keyframes fwdInL {0%{transform:rotateY(-180deg)}100%{transform:rotateY(0)}}
@keyframes bwdOutL{0%{transform:rotateY(0)}100%{transform:rotateY(-180deg)}}
@keyframes bwdInR {0%{transform:rotateY(180deg)}100%{transform:rotateY(0)}}
.anim-fwd-out-r{animation:fwdOutR .5s cubic-bezier(.645,.045,.355,1) forwards;z-index:20!important;}
.anim-fwd-in-l {animation:fwdInL  .5s cubic-bezier(.645,.045,.355,1) forwards;z-index:20!important;}
.anim-bwd-out-l{animation:bwdOutL .5s cubic-bezier(.645,.045,.355,1) forwards;z-index:20!important;}
.anim-bwd-in-r {animation:bwdInR  .5s cubic-bezier(.645,.045,.355,1) forwards;z-index:20!important;}

/* ── CONTROLS ── */
.controls{display:flex;align-items:center;gap:18px;margin-top:22px;}
.cbtn{
  background:rgba(200,132,58,0.15);border:1px solid rgba(200,132,58,0.4);
  color:#c8843a;font-family:Georgia,serif;font-size:0.75rem;
  letter-spacing:.1em;padding:9px 22px;cursor:pointer;transition:all .2s;
}
.cbtn:hover:not(:disabled){background:rgba(200,132,58,0.28);color:#d4a85c;}
.cbtn:disabled{opacity:.28;cursor:default;}
.pind{font-family:Georgia,serif;font-size:0.62rem;letter-spacing:.14em;color:#7a6e60;min-width:90px;text-align:center;}
.hint{margin-top:10px;font-family:Georgia,serif;font-size:0.52rem;letter-spacing:.14em;color:#4a4035;text-transform:uppercase;}
.hint kbd{border:1px solid rgba(200,132,58,0.2);padding:1px 5px;font-family:inherit;color:rgba(200,132,58,0.5);font-size:inherit;}

/* ── RESPONSIVE ── */
@media(max-width:720px){
  .book-wrapper{width:340px;height:280px;}
  .page{width:170px;height:280px;}
  .page.right{left:170px;}
  .page-face .text-page{padding:16px 12px;}
  .page-face .text-page .body{font-size:0.52rem;line-height:1.65;}
  .page-face .text-page .body.dc::first-letter{font-size:1.8rem;}
  .page-face .text-page .ch-title{font-size:0.78rem;}
  .hint{display:none;}
}
@media(max-width:380px){
  .book-wrapper{width:290px;height:240px;}
  .page{width:145px;height:240px;}
  .page.right{left:145px;}
}
</style>
</head>
<body>

<div class="book-wrapper" id="book">
  <div class="book-spine"></div>
  <div class="page left"  id="lp"></div>
  <div class="page right" id="rp"></div>
</div>

<div class="controls">
  <button class="cbtn" id="bp">&#8592; Zurück</button>
  <div class="pind" id="ind">1 / 10</div>
  <button class="cbtn" id="bn">Weiter &#8594;</button>
</div>
<div class="hint"><kbd>&#8592;</kbd> <kbd>&#8594;</kbd> Pfeiltasten &nbsp;&middot;&nbsp; Wischen zum Bl&auml;ttern</div>

<script>
// ── PAGE BUILDERS ──────────────────────────────────────────────

function pgCover() {
  return '<div class="page-face dark"><img class="full" src="images/Cover.png" alt="Cover"/></div>';
}

function pgBlank() {
  return '<div class="page-face dark"></div>';
}

function pgForeword() {
  // page 12 — foreword closing text
  return '<div class="page-face"><img class="full" src="images/page 12.png" alt="Vorwort"/></div>';
}

function pgEpigraph() {
  // page 6 — quote page, light background
  return '<div class="page-face"><img class="full" src="images/page 6.png" alt="Epigraph"/></div>';
}

function pgJoesTable() {
  // page 7 — Joe's Table photo
  return '<div class="page-face"><img class="full" src="images/page 7.png" alt="Joe\'s Table"/></div>';
}

function pgIndex() {
  return '<div class="page-face"><img class="full" src="images/Index.png" alt="Inhaltsverzeichnis"/></div>';
}

function pgPopup() {
  // page 8 — Joe at pop-up kitchen
  return '<div class="page-face"><img class="full" src="images/page 8.png" alt="Joe beim Pop-up"/></div>';
}

function pgChapterOpener() {
  // page 14 — Wo zur Hölle fange ich an?
  return '<div class="page-face"><img class="full" src="images/page 14.png" alt="Kapitel: Wo zur Hölle"/></div>';
}

function pgChapter1Body() {
  // page 15 — body text
  return '<div class="page-face"><img class="full" src="images/page 15.png" alt="Seite 15"/></div>';
}

function pgBodyP16() {
  return '<div class="page-face"><img class="full" src="images/page 16.png" alt="Seite 16"/></div>';
}

function pgFamilyPortugal() {
  // page 20 — family photo Portugal
  return '<div class="page-face"><img class="full" src="images/page 20.png" alt="Familienfoto Portugal"/></div>';
}

function pgKat() {
  // page 21 — Kat photo
  return '<div class="page-face"><img class="full" src="images/page 21.png" alt="Vor jedem Sturm"/></div>';
}

function pgOysterStory() {
  // page 26 — Tony's oyster
  return '<div class="page-face"><img class="full" src="images/page 26.png" alt="Tonys Auster"/></div>';
}

function pgOysterEnd() {
  // page 27
  return '<div class="page-face"><img class="full" src="images/page 27.png" alt="Seite 27"/></div>';
}

function pgCh3Opener() {
  // page 37 — Kapitel 3 Gnocchi
  return '<div class="page-face"><img class="full" src="images/page 37.png" alt="Kapitel 3 — Gnocchi"/></div>';
}

function pgMobsterBall() {
  // page 62
  return '<div class="page-face"><img class="full" src="images/page 62.png" alt="Mobster Ball"/></div>';
}

function pgJoeDogs() {
  // page 63
  return '<div class="page-face"><img class="full" src="images/page 63.png" alt="Joe Dogs"/></div>';
}

function pgBabyJoe() {
  // page 13
  return '<div class="page-face"><img class="full" src="images/page 13.png" alt="Baby Joe"/></div>';
}

function pgFamilyGang() {
  // page 65
  return '<div class="page-face"><img class="full" src="images/page 65.png" alt="Family Gang 1973"/></div>';
}

function pgTiramisu() {
  // page 78 — Tiramisu im Bordell
  return '<div class="page-face"><img class="full" src="images/page 78.png" alt="Tiramisu im Bordell"/></div>';
}

function pgCh9Opener() {
  // page 82
  return '<div class="page-face"><img class="full" src="images/page 82.png" alt="Kapitel 9"/></div>';
}

function pgJoesTableExp() {
  // page 114 — Die JoEs TaBLe Experience dinner
  return '<div class="page-face"><img class="full" src="images/page 114.png" alt="Die JoEs TaBLe Experience"/></div>';
}

function pgWeAreWhatWeEat() {
  // page 116 — WeWork Amsterdam talk
  return '<div class="page-face"><img class="full" src="images/page 116.png" alt="We are what we eat — WeWork Amsterdam"/></div>';
}

function pgFoodIsEverything() {
  // page 117 — Food Is Everything / Anthony Bourdain quote
  return '<div class="page-face"><img class="full" src="images/page 117.png" alt="Food Is Everything — Anthony Bourdain"/></div>';
}

function pgBackCover() {
  return '<div class="page-face dark">'
    +'<div class="text-page" style="background:#0f0d0a;justify-content:space-between;align-items:center;text-align:center;">'
    +'<div style="font-family:Georgia,serif;font-size:0.5rem;letter-spacing:.22em;color:rgba(200,132,58,0.38);text-transform:uppercase;margin-top:20px;">Eine Kulinarische Reise</div>'
    +'<div style="font-family:Georgia,serif;font-style:italic;font-size:0.7rem;line-height:1.75;color:#cfc0a2;margin:auto 0;text-align:center;padding:0 16px;">'
    +'&bdquo;Essen ohne Geschichte ist reine Kalorienaufnahme. Wenn du an unserem Tisch sitzt, servieren wir nicht blo&szlig; Zutaten. Wir servieren Geschichte, die eine Mahlzeit in eine Offenbarung verwandelt.&ldquo;'
    +'</div>'
    +'<div>'
    +'<div style="width:28px;height:1px;background:rgba(200,132,58,0.2);margin:0 auto 12px;"></div>'
    +'<div style="font-family:Georgia,serif;font-size:0.46rem;letter-spacing:.16em;color:rgba(200,132,58,0.3);text-transform:uppercase;text-align:center;">J. D\'Costa Andrade &middot; 1. Auflage &middot; 2026</div>'
    +'</div>'
    +'</div></div>';
}

// ── SPREADS: [leftFn, rightFn]  null = closed dark side ────────
var spreads = [
  [null,           pgCover],          //  1 — Front cover
  [pgIndex,        pgEpigraph],       //  2 — Index + Epigraph (p.6)
  [pgJoesTable,    pgPopup],          //  3 — Joe's Table (p.7) + Pop-up kitchen (p.8)
  [pgForeword,     pgChapterOpener],  //  4 — Foreword (p.12) + Ch.1 opener (p.14)
  [pgChapter1Body, pgBodyP16],        //  5 — p.15 + p.16
  [pgBabyJoe,      pgFamilyPortugal], //  6 — Baby Joe (p.13) + Family Portugal (p.20)
  [pgKat,          pgOysterStory],    //  7 — Kat (p.21) + Tony's Oyster (p.26)
  [pgOysterEnd,    pgCh3Opener],      //  8 — p.27 + Kapitel 3 (p.37)
  [pgMobsterBall,  pgJoeDogs],        //  9 — Mobster Ball (p.62) + Joe Dogs (p.63)
  [pgFamilyGang,   pgTiramisu],       // 10 — Family Gang 1973 (p.65) + Tiramisu (p.78)
  [pgCh9Opener,    pgJoesTableExp],   // 11 — Kapitel 9 (p.82) + JoEs TaBLe Exp (p.114)
  [pgWeAreWhatWeEat, pgFoodIsEverything], // 12 — WeWork Amsterdam (p.116) + Food Is Everything (p.117)
  [pgBackCover,    null],             // 13 — Back cover
];

var cur = 0, busy = false;
var lp  = document.getElementById('lp');
var rp  = document.getElementById('rp');
var ind = document.getElementById('ind');
var btnP = document.getElementById('bp');
var btnN = document.getElementById('bn');

function render(idx) {
  var s = spreads[idx];
  lp.innerHTML = s[0] ? s[0]() : '<div class="page-face dark"></div>';
  rp.innerHTML = s[1] ? s[1]() : '<div class="page-face dark"></div>';
  ind.textContent = (idx+1) + ' / ' + spreads.length;
  btnP.disabled = idx === 0;
  btnN.disabled = idx === spreads.length - 1;
}

function flip(next) {
  if (busy) return;
  if (next < 0 || next >= spreads.length) return;
  busy = true;
  var fwd = next > cur;

  if (fwd) {
    rp.classList.add('anim-fwd-out-r');
    rp.addEventListener('animationend', function once() {
      rp.removeEventListener('animationend', once);
      rp.classList.remove('anim-fwd-out-r');
      cur = next; render(cur);
      lp.classList.add('anim-fwd-in-l');
      lp.addEventListener('animationend', function d() {
        lp.removeEventListener('animationend', d);
        lp.classList.remove('anim-fwd-in-l');
        busy = false;
      });
    });
  } else {
    lp.classList.add('anim-bwd-out-l');
    lp.addEventListener('animationend', function once() {
      lp.removeEventListener('animationend', once);
      lp.classList.remove('anim-bwd-out-l');
      cur = next; render(cur);
      rp.classList.add('anim-bwd-in-r');
      rp.addEventListener('animationend', function d() {
        rp.removeEventListener('animationend', d);
        rp.classList.remove('anim-bwd-in-r');
        busy = false;
      });
    });
  }
}

btnN.addEventListener('click', function(){ flip(cur+1); });
btnP.addEventListener('click', function(){ flip(cur-1); });
document.addEventListener('keydown', function(e){
  if(e.key==='ArrowRight') flip(cur+1);
  if(e.key==='ArrowLeft')  flip(cur-1);
});
var tx=0;
document.addEventListener('touchstart',function(e){tx=e.touches[0].clientX;},{passive:true});
document.addEventListener('touchend',function(e){
  var dx=e.changedTouches[0].clientX-tx;
  if(Math.abs(dx)>40){dx<0?flip(cur+1):flip(cur-1);}
},{passive:true});

render(0);
</script>
</body>
</html>
