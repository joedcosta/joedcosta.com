<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Amostra — Uma Jornada Culinária</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg"/>
<link rel="icon" type="image/x-icon" href="favicon.ico"/>
<link rel="apple-touch-icon" href="apple-touch-icon.png"/>
<meta property="og:title" content="Amostra — Uma Jornada Culinária"/>
<meta property="og:description" content="23 páginas de leitura gratuita. Capa, índice, introdução e dois capítulos completos."/>
<meta property="og:image" content="https://joedcosta.com/og-image.png"/>
<meta property="og:url" content="https://joedcosta.com/preview-pt.html"/>
<meta property="og:type" content="website"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; background: #0f0d0a; font-family: 'Cinzel', serif; }
  body { display: flex; flex-direction: column; }
  .topbar {
    flex-shrink: 0; display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; height: 60px;
    background: rgba(15,13,10,0.98);
    border-bottom: 1px solid rgba(255,255,255,0.12); z-index: 10;
  }
  .back-btn {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 0.18em;
    text-transform: uppercase; color: #ffffff; text-decoration: none;
    border: 1px solid rgba(255,255,255,0.4); padding: 9px 18px;
    transition: all 0.2s; background: none; white-space: nowrap;
  }
  .back-btn:hover { background: rgba(255,255,255,0.1); border-color: #ffffff; }
  .topbar-title {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 1.1rem; font-weight: 300; color: #ffffff;
    text-align: center; flex: 1; padding: 0 16px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .topbar-right {
    display: flex; align-items: center; gap: 10px;
    min-width: 180px; justify-content: flex-end; flex-shrink: 0;
  }
  .page-info {
    font-size: 0.58rem; letter-spacing: 0.12em;
    color: rgba(255,255,255,0.6); text-transform: uppercase; white-space: nowrap;
  }
  .view-btn {
    font-size: 0.56rem; letter-spacing: 0.1em; text-transform: uppercase;
    color: rgba(255,255,255,0.6); background: none;
    border: 1px solid rgba(255,255,255,0.3); padding: 6px 12px; cursor: pointer;
    transition: all 0.2s; white-space: nowrap;
  }
  .view-btn.active, .view-btn:hover { color: #ffffff; border-color: #ffffff; background: rgba(255,255,255,0.08); }
  .viewer {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    background: #1c1914;
    display: flex; flex-direction: column; align-items: center;
    padding: 20px 0;
    -webkit-user-select: none; user-select: none;
  }
  .viewer::-webkit-scrollbar { width: 5px; }
  .viewer::-webkit-scrollbar-track { background: #0f0d0a; }
  .viewer::-webkit-scrollbar-thumb { background: rgba(200,132,58,0.2); border-radius: 3px; }
  .spread { display: flex; gap: 0; justify-content: center; width: 100%; }
  canvas.pdf-page { display: block; box-shadow: 0 6px 32px rgba(0,0,0,0.65); }
  .loader {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 300px; gap: 16px;
    color: rgba(200,132,58,0.45);
    font-size: 0.58rem; letter-spacing: 0.18em; text-transform: uppercase;
  }
  .loader-ring {
    width: 32px; height: 32px; border-radius: 50%;
    border: 2px solid rgba(200,132,58,0.15);
    border-top-color: #c8843a;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .bottombar {
    flex-shrink: 0; display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; height: 56px;
    background: rgba(15,13,10,0.98);
    border-top: 1px solid rgba(255,255,255,0.12);
    position: relative;
  }
  .nav-btns { display: flex; gap: 10px; }
  .nav-btn {
    font-size: 0.62rem; letter-spacing: 0.14em; text-transform: uppercase;
    color: #ffffff; background: none;
    border: 1px solid rgba(255,255,255,0.4); padding: 9px 20px; cursor: pointer;
    transition: all 0.2s;
  }
  .nav-btn:hover:not(:disabled) { background: rgba(255,255,255,0.1); border-color: #ffffff; }
  .nav-btn:disabled { opacity: 0.2; cursor: default; }
  .spread-counter {
    position: absolute; left: 50%; transform: translateX(-50%);
    font-size: 0.58rem; letter-spacing: 0.14em;
    color: rgba(255,255,255,0.5); text-transform: uppercase; white-space: nowrap;
  }
  .buy-link {
    font-size: 0.58rem; letter-spacing: 0.16em; text-transform: uppercase;
    color: #c8843a; text-decoration: none;
    border: 1px solid rgba(200,132,58,0.4); padding: 9px 20px;
    transition: all 0.2s; white-space: nowrap;
  }
  .buy-link:hover { color: #d4a85c; border-color: rgba(200,132,58,0.7); background: rgba(200,132,58,0.08); }
  .mobile-gate {
    display: none;
    flex: 1; flex-direction: column; align-items: center; justify-content: center;
    padding: 40px 28px; text-align: center; gap: 20px; background: #1c1914;
  }
  .mobile-gate p {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 1.1rem; color: #cfc0a2; line-height: 1.7; max-width: 300px;
  }
  .mobile-gate .open-btn {
    display: inline-flex; align-items: center; gap: 10px;
    font-size: 0.62rem; letter-spacing: 0.18em; text-transform: uppercase;
    color: #0f0d0a; background: #c8843a; padding: 14px 28px;
    text-decoration: none; font-weight: 600; transition: background 0.2s;
  }
  .mobile-gate .open-btn:hover { background: #d4a85c; }
  .mobile-gate .note {
    font-size: 0.5rem; letter-spacing: 0.14em; text-transform: uppercase;
    color: rgba(200,132,58,0.35);
  }
  @media (max-width: 640px) {
    .viewer { display: none; }
    .topbar-right { display: none; }
    .bottombar .nav-btns, .spread-counter { display: none; }
    .mobile-gate { display: flex; }
  }
</style>
</head>
<body>

<div class="topbar">
  <a class="back-btn" href="https://joedcosta.com">&#8592; joedcosta.com</a>
  <div class="topbar-title">Uma Jornada Culinária — Amostra</div>
  <div class="topbar-right">
    <span class="page-info" id="page-info">A carregar…</span>
    <button class="view-btn active" id="btn-double" onclick="setView(2)">&#8859; Doppel#8859; Duplo</button>
    <button class="view-btn" id="btn-single" onclick="setView(1)">&#8863; Einzel#8863; Individual</button>
  </div>
</div>

<div class="viewer" id="viewer">
  <div class="loader" id="loader">
    <div class="loader-ring"></div>
    <span>A carregar a amostra…</span>
  </div>
</div>

<div class="mobile-gate">
  <p>Abra a amostra diretamente no seu browser. As 23 páginas, otimizadas para o seu dispositivo.</p>
  <a class="open-btn" href="Preview-PT.pdf">Abrir Amostra &#8599;</a>
  <div class="note">Abre como PDF no Safari / Chrome</div>
</div>

<div class="bottombar">
  <div class="nav-btns">
    <button class="nav-btn" id="btn-prev" onclick="prevSpread()" disabled>&#8592; Zurück#8592; Anterior</button>
    <button class="nav-btn" id="btn-next" onclick="nextSpread()">Seguinte Weiter &#8594;#8594;</button>
  </div>
  <span class="spread-counter" id="spread-info"></span>
  <a class="buy-link" href="https://joedcosta.com/#buy">Encomendar agora</a>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
document.addEventListener('contextmenu', function(e){ e.preventDefault(); });
document.addEventListener('keydown', function(e){
  if ((e.ctrlKey||e.metaKey) && ['s','p','u','a'].includes(e.key.toLowerCase())) e.preventDefault();
});

pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

var DPR = window.devicePixelRatio || 1;
var pdfDoc = null;
var viewMode = 2;
var spreadIdx = 0;
var totalSpreads = 0;
var viewer = document.getElementById('viewer');
var loader = document.getElementById('loader');

pdfjsLib.getDocument('Preview-PT.pdf').promise.then(function(pdf){
  pdfDoc = pdf;
  loader.style.display = 'none';
  calcTotalSpreads();
  renderSpread(0);
}).catch(function(err){
  loader.innerHTML = '<span style="color:#c07060;font-size:0.6rem;letter-spacing:0.14em;">Fehler beim Laden. Bitte Seite neu laden.</span>';
  console.error(err);
});

function calcTotalSpreads(){
  if(!pdfDoc) return;
  totalSpreads = (viewMode===1) ? pdfDoc.numPages : Math.ceil(pdfDoc.numPages/2);
}

function spreadToPageNums(idx){
  if(!pdfDoc) return [];
  var n = pdfDoc.numPages;
  if(viewMode===1) return [idx+1];
  if(idx===0) return [1];
  var left = idx*2, right = idx*2+1;
  if(left > n) return [];
  if(right > n) return [left];
  return [left, right];
}

function renderSpread(idx){
  spreadIdx = idx;
  while(viewer.firstChild){ viewer.removeChild(viewer.firstChild); }
  var pageNums = spreadToPageNums(idx);
  if(!pageNums.length){ updateNav(); return; }
  var viewerW = viewer.clientWidth;
  var viewerH = viewer.clientHeight - 40;
  Promise.all(pageNums.map(function(num){ return pdfDoc.getPage(num); }))
  .then(function(pdfPages){
    var vp0 = pdfPages[0].getViewport({scale:1});
    var pagesCount = pageNums.length;
    var logicalW = pagesCount===2 ? Math.floor(viewerW/2) : Math.min(viewerW, 780);
    var scale = logicalW / vp0.width;
    var logicalH = vp0.height * scale;
    if(logicalH > viewerH){
      scale = scale * (viewerH / logicalH);
      logicalW = Math.floor(vp0.width * scale);
    }
    var spread = document.createElement('div');
    spread.className = 'spread';
    viewer.appendChild(spread);
    pdfPages.forEach(function(page){
      var vp = page.getViewport({scale: scale});
      var canvas = document.createElement('canvas');
      canvas.className = 'pdf-page';
      canvas.width  = Math.round(vp.width  * DPR);
      canvas.height = Math.round(vp.height * DPR);
      canvas.style.width  = Math.round(vp.width)  + 'px';
      canvas.style.height = Math.round(vp.height) + 'px';
      spread.appendChild(canvas);
      var ctx = canvas.getContext('2d');
      ctx.scale(DPR, DPR);
      page.render({ canvasContext: ctx, viewport: vp });
    });
    updateNav();
  });
}

function prevSpread(){ if(spreadIdx>0) renderSpread(spreadIdx-1); }
function nextSpread(){ if(spreadIdx<totalSpreads-1) renderSpread(spreadIdx+1); }

function updateNav(){
  var n = pdfDoc ? pdfDoc.numPages : 0;
  document.getElementById('btn-prev').disabled = (spreadIdx===0);
  document.getElementById('btn-next').disabled = (spreadIdx>=totalSpreads-1);
  var pages = spreadToPageNums(spreadIdx);
  var label = pages.length ? 'P. '+pages.join('–')+' / '+n : '';
  document.getElementById('page-info').textContent = label;
  document.getElementById('spread-info').textContent = label;
}

function setView(mode){
  viewMode = mode;
  document.getElementById('btn-single').className='view-btn'+(mode===1?' active':'');
  document.getElementById('btn-double').className='view-btn'+(mode===2?' active':'');
  calcTotalSpreads();
  var curPage = (spreadToPageNums(spreadIdx)[0])||1;
  var newIdx = (mode===1) ? curPage-1 : (curPage<=1 ? 0 : Math.floor((curPage-1)/2));
  renderSpread(Math.min(newIdx, totalSpreads-1));
}

var resizeTimer;
window.addEventListener('resize', function(){
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(function(){ renderSpread(spreadIdx); }, 150);
});
</script>
</body>
</html>
