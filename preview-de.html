<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vorschau — Eine Kulinarische Reise</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; background: #0f0d0a; font-family: 'Cinzel', serif; }
  body { display: flex; flex-direction: column; }

  /* ── TOP BAR ── */
  .topbar {
    flex-shrink: 0; display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; height: 56px;
    background: rgba(15,13,10,0.97);
    border-bottom: 1px solid rgba(200,132,58,0.2); z-index: 10;
  }
  .back-btn {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 0.18em;
    text-transform: uppercase; color: #c8843a; text-decoration: none;
    border: 1px solid rgba(200,132,58,0.35); padding: 7px 16px;
    transition: all 0.2s; background: none; white-space: nowrap;
  }
  .back-btn:hover { background: rgba(200,132,58,0.1); border-color: rgba(200,132,58,0.6); color: #d4a85c; }
  .topbar-title {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 1.0rem; font-weight: 300; color: #f0e8d8;
    text-align: center; flex: 1; padding: 0 16px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .topbar-right {
    display: flex; align-items: center; gap: 10px;
    min-width: 160px; justify-content: flex-end; flex-shrink: 0;
  }
  .page-info {
    font-size: 0.5rem; letter-spacing: 0.12em;
    color: rgba(200,132,58,0.45); text-transform: uppercase; white-space: nowrap;
  }
  .view-btn {
    font-size: 0.5rem; letter-spacing: 0.1em; text-transform: uppercase;
    color: rgba(200,132,58,0.5); background: none;
    border: 1px solid rgba(200,132,58,0.2); padding: 4px 9px; cursor: pointer;
    transition: all 0.2s; white-space: nowrap;
  }
  .view-btn.active, .view-btn:hover { color: #c8843a; border-color: rgba(200,132,58,0.5); background: rgba(200,132,58,0.06); }

  /* ── VIEWER ── */
  .viewer {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    background: #1c1914;
    display: flex; flex-direction: column; align-items: center;
    padding: 24px 16px; gap: 16px;
    -webkit-user-select: none; user-select: none;
  }
  .viewer::-webkit-scrollbar { width: 5px; }
  .viewer::-webkit-scrollbar-track { background: #0f0d0a; }
  .viewer::-webkit-scrollbar-thumb { background: rgba(200,132,58,0.2); border-radius: 3px; }

  .spread {
    display: flex; gap: 3px; justify-content: center;
    width: 100%;
  }

  /* Each canvas fills available width, sharp at all pixel densities */
  canvas.pdf-page {
    display: block;
    box-shadow: 0 6px 32px rgba(0,0,0,0.65);
    /* CSS size set by JS to logical pixels */
  }

  /* loading */
  .loader {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 300px; gap: 16px;
    color: rgba(200,132,58,0.45);
    font-size: 0.58rem; letter-spacing: 0.18em; text-transform: uppercase;
  }
  .loader-ring {
    width: 32px; height: 32px; border-radius: 50%;
    border: 2px solid rgba(200,132,58,0.15);
    border-top-color: #c8843a;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── BOTTOM BAR ── */
  .bottombar {
    flex-shrink: 0; display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; height: 48px;
    background: rgba(15,13,10,0.97);
    border-top: 1px solid rgba(200,132,58,0.1);
  }
  .nav-btns { display: flex; gap: 8px; }
  .nav-btn {
    font-size: 0.55rem; letter-spacing: 0.12em; text-transform: uppercase;
    color: #c8843a; background: none;
    border: 1px solid rgba(200,132,58,0.3); padding: 6px 16px; cursor: pointer;
    transition: all 0.2s;
  }
  .nav-btn:hover:not(:disabled) { background: rgba(200,132,58,0.1); }
  .nav-btn:disabled { opacity: 0.2; cursor: default; }
  .spread-info {
    font-size: 0.5rem; letter-spacing: 0.14em;
    color: rgba(200,132,58,0.35); text-transform: uppercase;
  }
  .buy-link {
    font-size: 0.52rem; letter-spacing: 0.14em; text-transform: uppercase;
    color: #c8843a; text-decoration: none;
    border-bottom: 1px solid rgba(200,132,58,0.3); padding-bottom: 1px;
    transition: color 0.2s; white-space: nowrap;
  }
  .buy-link:hover { color: #d4a85c; }

  /* ── MOBILE: redirect to native PDF viewer ── */
  .mobile-gate {
    display: none;
    flex: 1; flex-direction: column; align-items: center; justify-content: center;
    padding: 40px 28px; text-align: center; gap: 20px; background: #1c1914;
  }
  .mobile-gate p {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 1.1rem; color: #cfc0a2; line-height: 1.7; max-width: 300px;
  }
  .mobile-gate .open-btn {
    display: inline-flex; align-items: center; gap: 10px;
    font-size: 0.62rem; letter-spacing: 0.18em; text-transform: uppercase;
    color: #0f0d0a; background: #c8843a; padding: 14px 28px;
    text-decoration: none; font-weight: 600; transition: background 0.2s;
  }
  .mobile-gate .open-btn:hover { background: #d4a85c; }
  .mobile-gate .note {
    font-size: 0.5rem; letter-spacing: 0.14em; text-transform: uppercase;
    color: rgba(200,132,58,0.35);
  }

  @media (max-width: 640px) {
    .viewer { display: none; }
    .topbar-right { display: none; }
    .bottombar .nav-btns, .bottombar .spread-info { display: none; }
    .mobile-gate { display: flex; }
  }
</style>
</head>
<body>

<div class="topbar">
  <a class="back-btn" href="https://joedcosta.com">← joedcosta.com</a>
  <div class="topbar-title">Eine Kulinarische Reise — Vorschau</div>
  <div class="topbar-right">
    <span class="page-info" id="page-info">Laden…</span>
    <button class="view-btn active" id="btn-double" onclick="setView(2)">⊞ Doppel</button>
    <button class="view-btn" id="btn-single" onclick="setView(1)">⊟ Einzel</button>
  </div>
</div>

<!-- Desktop PDF.js viewer -->
<div class="viewer" id="viewer">
  <div class="loader" id="loader">
    <div class="loader-ring"></div>
    <span>Vorschau wird geladen…</span>
  </div>
</div>

<!-- Mobile: open native -->
<div class="mobile-gate">
  <p>Öffnen Sie die Vorschau direkt in Ihrem Browser — alle 23 Seiten, optimal auf Ihrem Gerät.</p>
  <a class="open-btn" href="Preview.pdf">Vorschau öffnen ↗</a>
  <div class="note">Öffnet als PDF in Safari / Chrome</div>
</div>

<div class="bottombar">
  <div class="nav-btns">
    <button class="nav-btn" id="btn-prev" onclick="prevSpread()" disabled>← Zurück</button>
    <button class="nav-btn" id="btn-next" onclick="nextSpread()">Weiter →</button>
  </div>
  <span class="spread-info" id="spread-info"></span>
  <a class="buy-link" href="https://joedcosta.com/#buy">Jetzt bestellen</a>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
// Block right-click and common save/print shortcuts
document.addEventListener('contextmenu', function(e){ e.preventDefault(); });
document.addEventListener('keydown', function(e){
  if ((e.ctrlKey||e.metaKey) && ['s','p','u','a'].includes(e.key.toLowerCase())) e.preventDefault();
});

pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// Use device pixel ratio for sharp Retina/HiDPI rendering
var DPR = window.devicePixelRatio || 1;

var pdfDoc     = null;
var viewMode   = 2;
var spreadIdx  = 0;
var totalSpreads = 0;
var viewer     = document.getElementById('viewer');
var loader     = document.getElementById('loader');

pdfjsLib.getDocument('Preview.pdf').promise.then(function(pdf){
  pdfDoc = pdf;
  loader.style.display = 'none';
  calcTotalSpreads();
  renderSpread(0);
}).catch(function(err){
  loader.innerHTML = '<span style="color:#c07060;font-size:0.6rem;letter-spacing:0.14em;">Fehler beim Laden. Bitte Seite neu laden.</span>';
  console.error(err);
});

function calcTotalSpreads(){
  if(!pdfDoc) return;
  var n = pdfDoc.numPages;
  totalSpreads = (viewMode===1) ? n : Math.ceil(n/2);
}

function spreadToPageNums(idx){
  if(!pdfDoc) return [];
  var n = pdfDoc.numPages;
  if(viewMode===1) return [idx+1];
  // cover (page 1) alone on spread 0, then pairs
  if(idx===0) return [1];
  var left = idx*2, right = idx*2+1;
  if(left > n) return [];
  if(right > n) return [left];
  return [left, right];
}

function renderSpread(idx){
  spreadIdx = idx;
  // clear viewer except loader
  while(viewer.firstChild){ viewer.removeChild(viewer.firstChild); }

  var pageNums = spreadToPageNums(idx);
  if(!pageNums.length){ updateNav(); return; }

  var viewerW = viewer.clientWidth - 32;

  Promise.all(pageNums.map(function(num){ return pdfDoc.getPage(num); }))
  .then(function(pdfPages){
    var vp0 = pdfPages[0].getViewport({scale:1});

    // determine logical (CSS) width per page
    var pagesCount = pageNums.length;
    var logicalW   = pagesCount===2 ? (viewerW/2 - 4) : Math.min(viewerW, 780);

    // scale so logical pixels fill the slot
    var scale      = logicalW / vp0.width;

    // clamp height to 80% of viewer height
    var viewerH    = viewer.clientHeight;
    var logicalH   = vp0.height * scale;
    if(logicalH > viewerH * 0.88){
      scale = scale * (viewerH * 0.88 / logicalH);
    }

    var spread = document.createElement('div');
    spread.className = 'spread';
    viewer.appendChild(spread);

    pdfPages.forEach(function(page){
      var vp      = page.getViewport({scale: scale});
      var canvas  = document.createElement('canvas');
      canvas.className = 'pdf-page';

      // physical pixels = logical × DPR  →  sharp on Retina
      canvas.width  = Math.round(vp.width  * DPR);
      canvas.height = Math.round(vp.height * DPR);

      // CSS size stays at logical pixels
      canvas.style.width  = Math.round(vp.width)  + 'px';
      canvas.style.height = Math.round(vp.height) + 'px';

      spread.appendChild(canvas);

      var ctx = canvas.getContext('2d');
      ctx.scale(DPR, DPR);  // scale context so PDF.js draws at physical resolution

      page.render({ canvasContext: ctx, viewport: vp });
    });

    updateNav();
  });
}

function prevSpread(){ if(spreadIdx>0) renderSpread(spreadIdx-1); }
function nextSpread(){ if(spreadIdx<totalSpreads-1) renderSpread(spreadIdx+1); }

function updateNav(){
  var n = pdfDoc ? pdfDoc.numPages : 0;
  document.getElementById('btn-prev').disabled = (spreadIdx===0);
  document.getElementById('btn-next').disabled = (spreadIdx>=totalSpreads-1);
  var pages = spreadToPageNums(spreadIdx);
  document.getElementById('page-info').textContent =
    pages.length ? 'S. '+pages.join('–')+' / '+n : '';
  document.getElementById('spread-info').textContent =
    (spreadIdx+1)+' / '+totalSpreads;
}

function setView(mode){
  viewMode = mode;
  document.getElementById('btn-single').className='view-btn'+(mode===1?' active':'');
  document.getElementById('btn-double').className='view-btn'+(mode===2?' active':'');
  calcTotalSpreads();
  var curPage = (spreadToPageNums(spreadIdx)[0])||1;
  var newIdx  = (mode===1) ? curPage-1 : (curPage<=1 ? 0 : Math.floor((curPage-1)/2));
  renderSpread(Math.min(newIdx, totalSpreads-1));
}

var resizeTimer;
window.addEventListener('resize', function(){
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(function(){ renderSpread(spreadIdx); }, 150);
});
</script>
</body>
</html>
