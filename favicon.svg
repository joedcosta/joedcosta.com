<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <clipPath id="c"><rect width="32" height="32" rx="2"/></clipPath>
  </defs>
  <!-- Book cover image fills the entire favicon -->
  <image clip-path="url(#c)"
    href="https://res.cloudinary.com/djzg1ulup/image/upload/v1771739932/Front__Cover_jgrhgf.jpg"
    x="0" y="0" width="32" height="32"
    preserveAspectRatio="xMidYMid slice"/>
  <!-- thin gold border -->
  <rect x="0.5" y="0.5" width="31" height="31" rx="1.5" fill="none" stroke="#c8843a" stroke-width="1"/>
</svg>
