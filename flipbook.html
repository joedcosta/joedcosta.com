<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Flipbook</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;overflow-x:hidden;}
body{
  background:#1c1914;
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;min-height:100vh;padding:24px 12px;
  font-family:Georgia,serif;user-select:none;
}

/* ── BOOK ── */
.book-scene{perspective:2000px;}
.book-wrapper{
  position:relative;
  width:680px;height:480px;
  filter:drop-shadow(0 32px 64px rgba(0,0,0,0.8));
}
.book-spine{
  position:absolute;left:50%;top:0;bottom:0;width:8px;
  transform:translateX(-50%);z-index:10;
  background:linear-gradient(to right,#050303,#1a0e05,#050303);
}

/* pages */
.page{
  position:absolute;top:0;
  width:340px;height:480px;
  backface-visibility:hidden;
  transform-style:preserve-3d;
}
.page.left {left:0;   transform-origin:right center;}
.page.right{left:340px;transform-origin:left center;}

.page-face{
  width:100%;height:100%;
  background:#f5edd8;
  overflow:hidden;position:relative;
}
.page.left  .page-face{border-radius:4px 0 0 4px;border:1px solid rgba(0,0,0,0.1);}
.page.right .page-face{border-radius:0 4px 4px 0;border:1px solid rgba(0,0,0,0.1);}

/* edge shadows */
.page.left .page-face::after{
  content:'';position:absolute;right:0;top:0;bottom:0;width:22px;
  background:linear-gradient(to left,rgba(0,0,0,0.13),transparent);
  pointer-events:none;z-index:5;
}
.page.right .page-face::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:22px;
  background:linear-gradient(to right,rgba(0,0,0,0.1),transparent);
  pointer-events:none;z-index:5;
}

/* flip animations */
@keyframes fwdOutR{0%{transform:rotateY(0)}100%{transform:rotateY(180deg)}}
@keyframes fwdInL {0%{transform:rotateY(-180deg)}100%{transform:rotateY(0)}}
@keyframes bwdOutL{0%{transform:rotateY(0)}100%{transform:rotateY(-180deg)}}
@keyframes bwdInR {0%{transform:rotateY(180deg)}100%{transform:rotateY(0)}}

.anim-fwd-out-r{animation:fwdOutR .52s cubic-bezier(.645,.045,.355,1) forwards;z-index:20!important;}
.anim-fwd-in-l {animation:fwdInL  .52s cubic-bezier(.645,.045,.355,1) forwards;z-index:20!important;}
.anim-bwd-out-l{animation:bwdOutL .52s cubic-bezier(.645,.045,.355,1) forwards;z-index:20!important;}
.anim-bwd-in-r {animation:bwdInR  .52s cubic-bezier(.645,.045,.355,1) forwards;z-index:20!important;}

/* ── CONTROLS ── */
.controls{display:flex;align-items:center;gap:18px;margin-top:24px;}
.cbtn{
  background:rgba(200,132,58,0.15);border:1px solid rgba(200,132,58,0.4);
  color:#c8843a;font-family:Georgia,serif;font-size:0.75rem;
  letter-spacing:0.1em;padding:9px 22px;cursor:pointer;transition:all .2s;
}
.cbtn:hover:not(:disabled){background:rgba(200,132,58,0.28);color:#d4a85c;}
.cbtn:disabled{opacity:.28;cursor:default;}
.pind{font-family:Georgia,serif;font-size:0.65rem;letter-spacing:.14em;color:#7a6e60;min-width:90px;text-align:center;}
.hint{margin-top:10px;font-family:Georgia,serif;font-size:0.55rem;letter-spacing:.14em;color:#4a4035;text-transform:uppercase;}
.hint kbd{border:1px solid rgba(200,132,58,0.2);padding:1px 5px;font-family:inherit;color:rgba(200,132,58,0.5);font-size:inherit;}

/* ── PAGE CONTENT ── */
.pc{padding:32px 28px;height:100%;display:flex;flex-direction:column;color:#2a1c0c;position:relative;}
.pgn{font-family:Georgia,serif;font-size:0.48rem;letter-spacing:.2em;color:rgba(200,132,58,0.45);text-transform:uppercase;text-align:center;}
.pgn.bot{margin-top:auto;}

/* cover */
.dark-bg{background:#0f0d0a!important;}
.dark-bg .pc{color:#f0e8d8;}
.cvr-orn{font-size:1.4rem;color:#c8843a;text-align:center;margin-bottom:18px;line-height:1;}
.cvr-img{width:110px;height:155px;margin:0 auto 18px;overflow:hidden;border:1px solid rgba(200,132,58,0.25);}
.cvr-img img{width:100%;height:100%;object-fit:cover;display:block;}
.cvr-t{font-family:Georgia,serif;font-size:0.95rem;letter-spacing:.14em;text-align:center;color:#f0e8d8;margin-bottom:4px;}
.cvr-s{font-family:Georgia,serif;font-style:italic;font-size:0.68rem;color:#cfc0a2;text-align:center;margin-bottom:18px;}
.cvr-ln{width:36px;height:1px;background:#c8843a;margin:0 auto 18px;}
.cvr-a{font-family:Georgia,serif;font-size:0.52rem;letter-spacing:.22em;color:rgba(200,132,58,0.55);text-transform:uppercase;text-align:center;}

/* headers */
.pghd{font-family:Georgia,serif;font-size:0.46rem;letter-spacing:.2em;color:rgba(200,132,58,0.38);text-transform:uppercase;text-align:center;border-bottom:1px solid rgba(200,132,58,0.1);padding-bottom:7px;margin-bottom:14px;}
.chn{font-family:Georgia,serif;font-size:0.52rem;letter-spacing:.24em;color:#c8843a;text-transform:uppercase;margin-bottom:10px;}
.cht{font-family:Georgia,serif;font-size:1.0rem;letter-spacing:.1em;color:#1a1008;line-height:1.35;margin-bottom:14px;}
.cho{font-size:1.1rem;color:rgba(200,132,58,0.3);display:block;margin-bottom:14px;}
.chi{font-family:Georgia,serif;font-style:italic;font-size:0.68rem;line-height:1.7;color:#3a2810;}

/* body text */
.bp{font-family:Georgia,serif;font-size:0.68rem;line-height:1.82;color:#2a1c0c;margin-bottom:9px;text-align:justify;}
.bp.it{font-style:italic;color:#4a3020;border-left:2px solid rgba(200,132,58,0.28);padding-left:9px;margin:10px 0;}
.bp.dc::first-letter{font-family:Georgia,serif;font-size:2.8rem;font-weight:600;float:left;line-height:.78;margin-right:5px;margin-top:4px;color:#c8843a;}

/* quote */
.cream-bg{background:#f0e0c0!important;}
.qp{font-family:Georgia,serif;font-size:0.9rem;font-style:italic;line-height:1.65;color:#1a1008;text-align:center;margin:auto 0;padding:16px 0;}
.qm{font-size:3.5rem;color:rgba(200,132,58,0.18);line-height:.45;display:block;margin-bottom:14px;text-align:center;}
.qa{font-family:Georgia,serif;font-size:0.48rem;letter-spacing:.2em;color:rgba(200,132,58,0.55);text-transform:uppercase;text-align:center;margin-top:16px;}

/* recipe */
.rt{font-family:Georgia,serif;font-size:0.78rem;letter-spacing:.12em;color:#1a1008;margin-bottom:3px;}
.rs{font-family:Georgia,serif;font-style:italic;font-size:0.62rem;color:#7a5030;margin-bottom:10px;}
.rdiv{height:1px;background:rgba(200,132,58,0.18);margin:8px 0;}
.rl{font-family:Georgia,serif;font-size:0.46rem;letter-spacing:.2em;color:rgba(200,132,58,0.55);text-transform:uppercase;margin-bottom:5px;}
.ing{font-size:0.62rem;color:#2a1c0c;padding:2px 0;border-bottom:1px dotted rgba(200,132,58,0.13);display:flex;justify-content:space-between;}
.stp{font-size:0.62rem;color:#2a1c0c;padding:3px 0;display:flex;gap:7px;}
.stn{font-family:Georgia,serif;font-size:0.52rem;color:#c8843a;flex-shrink:0;width:13px;}

/* back cover */
.bblurb{font-family:Georgia,serif;font-style:italic;font-size:0.68rem;line-height:1.75;color:#cfc0a2;margin:auto 0;text-align:center;}
.bisbn{font-family:Georgia,serif;font-size:0.46rem;letter-spacing:.16em;color:rgba(200,132,58,0.3);text-transform:uppercase;text-align:center;}

/* ── RESPONSIVE ── */
@media(max-width:720px){
  .book-wrapper{width:340px;height:280px;}
  .page{width:170px;height:280px;}
  .page.right{left:170px;}
  .cvr-img{width:60px;height:85px;}
  .bp{font-size:0.58rem;line-height:1.7;}
  .bp.dc::first-letter{font-size:2rem;}
  .cht{font-size:0.78rem;}
}
@media(max-width:380px){
  .book-wrapper{width:290px;height:240px;}
  .page{width:145px;height:240px;}
  .page.right{left:145px;}
  .pc{padding:18px 14px;}
}
</style>
</head>
<body>

<div class="book-scene">
  <div class="book-wrapper" id="book">
    <div class="book-spine"></div>
    <div class="page left"  id="lp"></div>
    <div class="page right" id="rp"></div>
  </div>
</div>

<div class="controls">
  <button class="cbtn" id="bp">&#8592; Zurück</button>
  <div class="pind" id="ind">Seite 1 / 6</div>
  <button class="cbtn" id="bn">Weiter &#8594;</button>
</div>
<div class="hint"><kbd>&#8592;</kbd> <kbd>&#8594;</kbd> Pfeiltasten &nbsp;·&nbsp; Wischen</div>

<script>
var COVER = "https://res.cloudinary.com/djzg1ulup/image/upload/v1771739932/Front__Cover_jgrhgf.jpg";

function pg0(){ // front cover — right only
  return '<div class="page-face dark-bg"><div class="pc" style="justify-content:center;align-items:center;">'
    +'<div class="cvr-orn">&#10022;</div>'
    +'<div class="cvr-img"><img src="'+COVER+'" alt="Cover"/></div>'
    +'<div class="cvr-t">Eine Kulinarische Reise</div>'
    +'<div class="cvr-s">Geschichten &amp; Erz&auml;hlungen</div>'
    +'<div class="cvr-ln"></div>'
    +'<div class="cvr-a">J. D\'Costa Andrade</div>'
    +'</div></div>';
}
function pg1(){ // title — left
  return '<div class="page-face"><div class="pc" style="justify-content:center;align-items:center;text-align:center;">'
    +'<div class="pgn">Eine Kulinarische Reise</div>'
    +'<div style="margin:auto 0;display:flex;flex-direction:column;align-items:center;gap:9px;">'
    +'<div style="font-family:Georgia,serif;font-size:0.5rem;letter-spacing:.24em;color:rgba(200,132,58,0.55);text-transform:uppercase;">J. D\'Costa Andrade</div>'
    +'<div style="width:28px;height:1px;background:rgba(200,132,58,0.28);"></div>'
    +'<div style="font-family:Georgia,serif;font-size:0.9rem;letter-spacing:.12em;color:#1a1008;line-height:1.4;">Eine<br>Kulinarische<br>Reise</div>'
    +'<div style="font-family:Georgia,serif;font-style:italic;font-size:0.65rem;color:#7a5030;">Geschichten &amp; Erz&auml;hlungen</div>'
    +'<div style="width:28px;height:1px;background:rgba(200,132,58,0.28);"></div>'
    +'<div style="font-family:Georgia,serif;font-size:0.46rem;letter-spacing:.2em;color:rgba(200,132,58,0.38);text-transform:uppercase;">1. Auflage &middot; 2026</div>'
    +'</div>'
    +'<div class="pgn bot">I</div>'
    +'</div></div>';
}
function pg2(){ // foreword — right
  return '<div class="page-face"><div class="pc">'
    +'<div class="pghd">Vorwort</div>'
    +'<p class="bp dc">Essen ist Erinnerung. Diese Wahrheit hat mich auf eine Reise gef&uuml;hrt, die weit &uuml;ber Rezepte hinausgeht &mdash; hinein in Geschichten, die sich an K&uuml;chentischen entfalten, die in Gew&uuml;rzger&uuml;chen verborgen liegen.</p>'
    +'<p class="bp">Dieses Buch ist kein Kochbuch im klassischen Sinne. Es ist ein Versuch, die unsichtbaren Zutaten einzufangen: die Geste einer Gro&szlig;mutter, den L&auml;rm eines Marktes in einer fremden Stadt, das Schweigen beim ersten Bissen eines vergessenen Gerichts.</p>'
    +'<p class="bp it">&bdquo;Die Basis aller Gerichte ist nie nur das Rezept. Es ist das Ged&auml;chtnis.&ldquo;</p>'
    +'<div class="pgn bot">1</div>'
    +'</div></div>';
}
function pg3(){ // ch1 opener — left
  return '<div class="page-face"><div class="pc" style="justify-content:center;">'
    +'<div style="margin:auto 0;">'
    +'<div class="chn">Kapitel Eins</div>'
    +'<span class="cho">&#10022;</span>'
    +'<div class="cht">Der erste<br>Geschmack</div>'
    +'<div class="chi">&Uuml;ber die Momente, die sich f&uuml;r immer in unser Ged&auml;chtnis einschreiben &mdash; die ersten Ger&uuml;che, Texturen und Mahlzeiten, die uns gepr&auml;gt haben.</div>'
    +'</div>'
    +'<div class="pgn bot">3</div>'
    +'</div></div>';
}
function pg4(){ // ch1 body — right
  return '<div class="page-face"><div class="pc">'
    +'<div class="pghd">Der erste Geschmack</div>'
    +'<p class="bp dc">Es war der Sommer meines siebten Lebensjahres, als ich verstand, dass Essen mehr ist als Nahrung. Meine Gro&szlig;mutter stand in ihrer kleinen K&uuml;che, die nach ger&ouml;stetem K&uuml;mmel duftete, und bewegte einen h&ouml;lzernen L&ouml;ffel durch eine dampfende Pfanne.</p>'
    +'<p class="bp">Ich fragte, was sie koche. Sie antwortete nicht mit Worten &mdash; sie reichte mir einen kleinen L&ouml;ffel. Der Geschmack traf mich wie eine Welle: warm, tief, komplex auf eine Art, die ich mit sieben Jahren noch nicht benennen konnte.</p>'
    +'<p class="bp it">&bdquo;Das ist das Rezept meiner Mutter&ldquo;, sagte sie. &bdquo;Und ihrer Mutter davor.&ldquo;</p>'
    +'<div class="pgn bot">4</div>'
    +'</div></div>';
}
function pg5(){ // quote — left
  return '<div class="page-face cream-bg"><div class="pc" style="justify-content:center;">'
    +'<div class="qp"><span class="qm">&#8220;</span>'
    +'Jedes Gericht erz&auml;hlt eine Geschichte &mdash; von H&auml;nden, die es zubereitet haben, von Tischen, an denen es geteilt wurde, von Zeiten, die es &uuml;berlebt hat.'
    +'</div>'
    +'<div class="qa">&mdash; J. D\'Costa Andrade</div>'
    +'</div></div>';
}
function pg6(){ // recipe — right
  return '<div class="page-face"><div class="pc">'
    +'<div class="pghd">Rezepte der Erinnerung</div>'
    +'<div class="rt">Gro&szlig;mutters K&uuml;mmelso&szlig;e</div>'
    +'<div class="rs">Ein Rezept, das drei Generationen &uuml;berdauert hat</div>'
    +'<div class="rdiv"></div>'
    +'<div class="rl">Zutaten &middot; 4 Personen</div>'
    +'<div class="ing"><span>K&uuml;mmel, gemahlen</span><span>2 TL</span></div>'
    +'<div class="ing"><span>Zwiebeln</span><span>2 mittelgro&szlig;</span></div>'
    +'<div class="ing"><span>Knoblauch</span><span>3 Zehen</span></div>'
    +'<div class="ing"><span>Br&uuml;he</span><span>500 ml</span></div>'
    +'<div class="ing"><span>Sahne</span><span>100 ml</span></div>'
    +'<div class="rdiv"></div>'
    +'<div class="rl">Zubereitung</div>'
    +'<div class="stp"><span class="stn">1.</span><span>Zwiebeln fein w&uuml;rfeln und in Butter goldgelb anschwitzen.</span></div>'
    +'<div class="stp"><span class="stn">2.</span><span>K&uuml;mmel und Knoblauch hinzuf&uuml;gen, 2 Min. r&ouml;sten.</span></div>'
    +'<div class="stp"><span class="stn">3.</span><span>Mit Br&uuml;he abl&ouml;schen, 15 Min. k&ouml;cheln, cremig r&uuml;hren.</span></div>'
    +'<div class="pgn bot">8</div>'
    +'</div></div>';
}
function pg7(){ // ch2 opener — left
  return '<div class="page-face"><div class="pc" style="justify-content:center;">'
    +'<div style="margin:auto 0;">'
    +'<div class="chn">Kapitel Zwei</div>'
    +'<span class="cho">&#10022;</span>'
    +'<div class="cht">M&auml;rkte<br>der Welt</div>'
    +'<div class="chi">Von den Gew&uuml;rzbasaren Marokkos bis zu den Fischhallen Barcelonas &mdash; &uuml;ber die Orte, an denen Kulturen sich begegnen und Geschichten entstehen.</div>'
    +'</div>'
    +'<div class="pgn bot">9</div>'
    +'</div></div>';
}
function pg8(){ // ch2 body — right
  return '<div class="page-face"><div class="pc">'
    +'<div class="pghd">M&auml;rkte der Welt</div>'
    +'<p class="bp dc">La Boqueria in Barcelona ist kein Markt. Es ist ein Gedicht. Die Farben der Tomaten, aufgestapelt wie kleine Sonnen. Die Ger&uuml;che von frischem Fisch, ger&auml;uchertem Schinken, reifen Pfirsichen. Die Stimmen der H&auml;ndler &mdash; ein Katalanisch, das wie Musik klingt.</p>'
    +'<p class="bp">Ich komme jeden Samstagmorgen hierher. Nicht immer um einzukaufen &mdash; manchmal nur um zu beobachten. Wie eine alte Frau Melonen bef&uuml;hlt, als w&uuml;rde sie B&uuml;cher lesen. Wie ein junger Koch mit einem Fischhändler &uuml;ber den Preis verhandelt, beide l&auml;chelnd.</p>'
    +'<p class="bp it">An M&auml;rkten versteht man eine Stadt besser als in jedem Reisef&uuml;hrer.</p>'
    +'<div class="pgn bot">10</div>'
    +'</div></div>';
}
function pg9(){ // back cover — left only
  return '<div class="page-face dark-bg"><div class="pc" style="justify-content:space-between;align-items:center;text-align:center;">'
    +'<div style="font-family:Georgia,serif;font-size:0.5rem;letter-spacing:.22em;color:rgba(200,132,58,0.38);text-transform:uppercase;margin-top:16px;">Eine Kulinarische Reise</div>'
    +'<div class="bblurb">&bdquo;Geschichten und Erz&auml;hlungen, die an Tischen entstehen &mdash; &uuml;ber das Kochen als Sprache, Erinnerung als Gew&uuml;rz und die unsichtbaren Zutaten, die jedes Gericht erst vollenden.&ldquo;</div>'
    +'<div><div style="width:28px;height:1px;background:rgba(200,132,58,0.18);margin:0 auto 12px;"></div>'
    +'<div class="bisbn">J. D\'Costa Andrade &middot; 1. Auflage &middot; 2026</div></div>'
    +'</div></div>';
}

// spreads: [leftFn, rightFn]  null = closed cover
var spreads = [
  [null,  pg0],
  [pg1,   pg2],
  [pg3,   pg4],
  [pg5,   pg6],
  [pg7,   pg8],
  [pg9,   null]
];

var cur = 0, busy = false;
var lp = document.getElementById('lp');
var rp = document.getElementById('rp');
var ind = document.getElementById('ind');
var btnP = document.getElementById('bp');
var btnN = document.getElementById('bn');

function empty(side) {
  // closed book cover sides
  return '<div class="page-face dark-bg"></div>';
}

function render(idx) {
  var s = spreads[idx];
  lp.innerHTML = s[0] ? s[0]() : empty('l');
  rp.innerHTML = s[1] ? s[1]() : empty('r');
  ind.textContent = 'Seite ' + (idx+1) + ' / ' + spreads.length;
  btnP.disabled = idx === 0;
  btnN.disabled = idx === spreads.length - 1;
}

function flip(next) {
  if (busy) return;
  if (next < 0 || next >= spreads.length) return;
  busy = true;
  var fwd = next > cur;

  function done(e) {
    if (fwd) {
      lp.removeEventListener('animationend', done);
      lp.classList.remove('anim-fwd-in-l');
    } else {
      rp.removeEventListener('animationend', done);
      rp.classList.remove('anim-bwd-in-r');
    }
    busy = false;
  }

  if (fwd) {
    rp.classList.add('anim-fwd-out-r');
    rp.addEventListener('animationend', function once() {
      rp.removeEventListener('animationend', once);
      rp.classList.remove('anim-fwd-out-r');
      cur = next;
      render(cur);
      lp.classList.add('anim-fwd-in-l');
      lp.addEventListener('animationend', done);
    });
  } else {
    lp.classList.add('anim-bwd-out-l');
    lp.addEventListener('animationend', function once() {
      lp.removeEventListener('animationend', once);
      lp.classList.remove('anim-bwd-out-l');
      cur = next;
      render(cur);
      rp.classList.add('anim-bwd-in-r');
      rp.addEventListener('animationend', done);
    });
  }
}

btnN.addEventListener('click', function(){ flip(cur+1); });
btnP.addEventListener('click', function(){ flip(cur-1); });
document.addEventListener('keydown', function(e){
  if(e.key==='ArrowRight') flip(cur+1);
  if(e.key==='ArrowLeft')  flip(cur-1);
});
var tx=0;
document.addEventListener('touchstart',function(e){tx=e.touches[0].clientX;},{passive:true});
document.addEventListener('touchend',function(e){
  var dx=e.changedTouches[0].clientX-tx;
  if(Math.abs(dx)>40){dx<0?flip(cur+1):flip(cur-1);}
},{passive:true});

render(0);
</script>
</body>
</html>
